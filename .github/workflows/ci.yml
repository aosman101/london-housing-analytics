name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.6.9

      - name: Lint Python with ruff
        run: ruff check src

      - name: Byte-compile Python (syntax check)
        run: python -m compileall -q src

      - name: Render dbt profile for parse-only check
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'EOF'
          housing_warehouse:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: analytics
                password: analytics
                dbname: housing_warehouse
                schema: analytics
                threads: 1
          EOF

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt parse
        working-directory: dbt
        run: dbt parse
